            background: #ffccdd;

            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .character-card .name {
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 70px;
        }
        .character-card .attr {
            font-size: 8px;
            background: #ffb6c1;
            color: white;
            padding: 2px 6px;
            border-radius: 20px;
            margin-top: 3px;
        }
        .character-card:not(.owned) {

            opacity: 0.6;
        }
        .character-card:not(.owned) .avatar {
            background: #bb99aa;
            content: "?";
        }

            flex-direction: column;
            gap: 15px;
        }

            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .gacha-btn {
            background: #ff99aa;
            border: none;
            border-bottom: 4px solid #ff4d6d;
            color: white;
            font-family: inherit;
            font-size: 16px;
            padding: 12px 20px;
            border-radius: 40px;
            width: 130px;
            cursor: pointer;
            box-shadow: 0 4px 0 #ff6680;
            transition: 0.05s linear;

        .gacha-btn:active {

            box-shadow: none;
        }
        .pity-counter {
            background: #ffe4ec;
            padding: 8px;
            border-radius: 30px;
            border: 2px solid #ffb6c1;
            font-size: 12px;
            display: flex;
            justify-content: space-around;

            background: #ffe4ec;
            border-radius: 20px;
            padding: 12px;
            min-height: 120px;
            border: 2px dashed #ff99aa;
            display: flex;

            justify-content: center;
        }
        .result-card {
            width: 70px;
            background: #ffd9e5;
            border: 2px solid #ff99aa;
            border-radius: 12px;
            padding: 6px 2px;
            text-align: center;
            font-size: 10px;
            animation: pop 0.2s ease;
        }
        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .footer-note {
            margin-top: 15px;
            font-size: 9px;
            color: #b36277;
            text-align: center;
        }
    </style>
</head>
